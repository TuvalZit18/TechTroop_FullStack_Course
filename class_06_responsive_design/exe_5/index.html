    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />

  <body>
    <div class="card-container">

        <img

      <div class="card-item-description">
        <div class="description-card-container">
          <h1>Premium Laptop</h1>
          <p>
            High-performance laopto perfect for developers and designers.
            Features the lates processor, ample RAM, and a stunning display that

          <div class="description-card-footer">

              <span>$1299</span>
            </div>
            <div class="description-card-footer-item">
              <button>Add to Cart</button>
