<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book of Wisdom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="main.js"></script>
  </head>
  <body>
    <div class="stage"></div>

    <div class="main-container">
      <header class="header">
        <span class="header-eyebrow"></span>
        <h1 class="header-title">The Book of Wisdom</h1>
        <p class="header-sub">Speak it once. It stays in the book forever.</p>
      </header>

      <div class="table">
        <input
          class="inputMessage"
          placeholder="Whisper your wisdom..."
          autocomplete="off"
        />
        <div class="table-actions">
          <button class="btnAdd">
            <span>Inscribe</span>
          </button>
          <button class="btnClear">Burn the Book</button>
        </div>
      </div>

      <div class="wisdom-container"></div>
      <p class="empty-state">The book is empty. Be the first voice in it.</p>
    </div>
  </body>
</html>
