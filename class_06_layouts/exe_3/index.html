<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="form-card">
      <div class="flex-container">
        <div class="form-header-container">
          <div class="header-container">
            <span>Contact Form</span>
          </div>
          <div class="subheader-container">
            <span>Get in touch with us</span>
          </div>
        </div>
        <div class="form-inputs-container">
          <div class="row-input-container">
            <div class="input-container">
              <lable>First Name</lable>
              <input type="text" />
            </div>
            <div class="input-container">
              <lable>Last Name</lable>
              <input type="text" />
            </div>
          </div>
          <div class="row-input-container">
            <div class="input-container">
              <lable>Email Address</lable>
              <input type="text" />
            </div>
          </div>
          <div class="row-input-container">
            <div class="input-container">
              <lable>Subject</lable>
              <select>
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
              </select>
            </div>
            <div class="input-container">
              <lable>Priority</lable>
              <select>
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
              </select>
            </div>
          </div>
          <div class="row-input-container">
            <div class="input-container">
              <lable>Message</lable>
              <textarea placeholder="Tell us how we can help..."></textarea>
            </div>
          </div>
          <div class="row-input-container">
            <span>Contact Preferences</span>
          </div>
          <div class="row-input-container">
            <div class="checkbox-container">
              <input type="checkbox" />
              <lable>Email Updates</lable>
            </div>
            <div class="checkbox-container">
              <input type="checkbox" />
              <lable>Phone Follow-up</lable>
            </div>
            <div class="checkbox-container">
              <input type="checkbox" />
              <lable>Newsletter</lable>
            </div>
          </div>
        </div>
        <div class="form-footer-container">
          <button class="save-button">Save Draft</button>
          <button class="send-button">Send Message</button>
        </div>
      </div>
    </div>
  </body>
</html>
